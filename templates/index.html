<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>심플 파이썬 계산기</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .calculator-card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 350px; }
        h2 { text-align: center; color: #333; margin-bottom: 1.5rem; }
        .input-group { margin-bottom: 1rem; }
        input[type="number"] { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        .button-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 1rem; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; transition: opacity 0.2s; }
        .btn-add { background-color: #4CAF50; }
        .btn-sub { background-color: #2196F3; }
        .btn-mul { background-color: #FF9800; }
        .btn-div { background-color: #f44336; }
        button:hover { opacity: 0.8; }
    </style>
</head>
<body>

<div class="calculator-card">
    <h2>계산기</h2>
    
    <div class="input-group">
        <input type="number" id="n1" placeholder="첫 번째 숫자" required>
        <input type="number" id="n2" placeholder="두 번째 숫자" required>
    </div>

    <div class="button-grid">
        <form action="/calcu" method="post" onsubmit="sync(this)">
            <input type="hidden" name="num1">
            <input type="hidden" name="num2">
            <input type="hidden" name="op" value="add">
            <button type="submit" class="btn-add">더하기 (+)</button>
        </form>

        <form action="/calcu" method="post" onsubmit="sync(this)">
            <input type="hidden" name="num1">
            <input type="hidden" name="num2">
            <input type="hidden" name="op" value="sub">
            <button type="submit" class="btn-sub">빼기 (-)</button>
        </form>

        <form action="/calcu" method="post" onsubmit="sync(this)">
            <input type="hidden" name="num1">
            <input type="hidden" name="num2">
            <input type="hidden" name="op" value="mul">
            <button type="submit" class="btn-mul">곱하기 (×)</button>
        </form>

        <form action="/calcu" method="post" onsubmit="sync(this)">
            <input type="hidden" name="num1">
            <input type="hidden" name="num2">
            <input type="hidden" name="op" value="div">
            <button type="submit" class="btn-div">나누기 (÷)</button>
        </form>
    </div>
</div>

<script>
    // 화면의 입력값을 각 폼의 hidden 필드에 복사해주는 함수
    function sync(form) {
        form.num1.value = document.getElementById('n1').value;
        form.num2.value = document.getElementById('n2').value;
    }
</script>

</body>
</html>
